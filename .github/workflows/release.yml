name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for changesets to detect what changed
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # NPM_CONFIG_USERCONFIG=/dev/null prevents any pre-configured _authToken
          # from interfering with npm's native OIDC trusted publishing exchange
          publish: NPM_CONFIG_USERCONFIG=/dev/null npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
